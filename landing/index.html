<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Lyte — espace de travail collaboratif avec salons vocaux, chat IA et enregistrement d'écran."
    />
    <title>Lyte — Espace de travail collaboratif</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="site-nav" data-active=""></div>

    <main class="home-main">
      <section class="hero">
        <div class="hero__text">
          <h1 class="hero__title">
            Votre espace de travail,<br />en une seule app.
          </h1>
          <p class="hero__lead">
            Salons vocaux, chat IA, calendrier, enregistrement d'écran et
            connecteurs — Lyte regroupe tout ce dont votre équipe a besoin au
            quotidien.
          </p>
          <div class="hero__cta">
            <a class="btn btn--primary" href="auth.html">
              <span>Commencer</span>
              <svg
                aria-hidden="true"
                viewBox="0 0 24 24"
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </a>
            <a class="btn btn--ghost" href="tarifs.html">
              <span>Voir les tarifs</span>
            </a>
          </div>
        </div>

        <figure class="hero__shot" aria-label="Aperçu de l'application Lyte">
          <img
            class="hero__shot-img"
            src="app-preview.png"
            alt="Aperçu de Lyte — vue principale avec salons vocaux et chat IA"
            loading="eager"
            decoding="async"
          />
        </figure>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <small class="site-footer__copy">
          © <span id="copy-year">2026</span> Lyte. Tous droits réservés.
        </small>
        <nav class="site-footer__links" aria-label="Liens du pied de page">
          <a href="tarifs.html">Tarifs</a>
          <a href="careers.html">Careers</a>
          <a href="ressources.html">Ressources</a>
          <a href="privacy.html">Confidentialité</a>
          <a href="terms.html">Conditions</a>
        </nav>
      </div>
    </footer>

    <script src="nav.js"></script>
    <script>
      (function () {
        var year = document.getElementById('copy-year');
        if (year) year.textContent = String(new Date().getFullYear());
      })();
    </script>
  </body>
</html>
