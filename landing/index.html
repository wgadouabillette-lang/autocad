<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Lyte — espace de travail collaboratif avec salons vocaux, chat IA et enregistrement d'écran."
    />
    <title>Lyte — Espace de travail collaboratif</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="site-nav" data-active=""></div>

    <main class="hero">
      <div class="hero__text">
        <h1 class="hero__title">Votre espace de travail,<br />en une seule app.</h1>
        <p class="hero__lead">
          Salons vocaux, chat IA, calendrier, enregistrement d'écran et connecteurs —
          Lyte regroupe tout ce dont votre équipe a besoin au quotidien.
        </p>
      </div>

      <div class="hero__product" aria-hidden="true">
        <div class="product-window">
          <div class="product-window__chrome">
            <span class="product-window__dot product-window__dot--red"></span>
            <span class="product-window__dot product-window__dot--yellow"></span>
            <span class="product-window__dot product-window__dot--green"></span>
            <span class="product-window__title">Lyte</span>
          </div>
          <div class="product-window__screen"></div>
        </div>
      </div>
    </main>

    <script src="nav.js"></script>
  </body>
</html>
