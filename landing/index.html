<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Lyte — espace de travail collaboratif avec salons vocaux, chat IA et enregistrement d'écran."
    />
    <title>Lyte — Espace de travail collaboratif</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="site-nav" data-active=""></div>

    <main class="home-main">
      <section class="hero">
        <div class="hero__text">
          <h1 class="hero__title">
            Votre espace de travail,<br />en une seule app.
          </h1>
          <p class="hero__lead">
            Salons vocaux, chat IA, calendrier, enregistrement d'écran et
            connecteurs — Lyte regroupe tout ce dont votre équipe a besoin au
            quotidien.
          </p>
          <div class="hero__cta">
            <a class="btn btn--primary" href="auth.html">
              <span>Commencer</span>
              <svg
                aria-hidden="true"
                viewBox="0 0 24 24"
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </a>
            <a class="btn btn--ghost" href="tarifs.html">
              <span>Voir les tarifs</span>
            </a>
          </div>
        </div>

        <figure class="hero__shot" aria-label="Aperçu de l'application Lyte">
          <img
            class="hero__shot-img"
            src="app-preview.png"
            alt="Aperçu de Lyte — vue principale avec salons vocaux et chat IA"
            loading="eager"
            decoding="async"
          />
        </figure>
      </section>

      <section class="home-highlights" aria-labelledby="highlights-heading">
        <div class="home-highlights__inner">
          <div class="home-highlights__header">
            <h2 id="highlights-heading" class="section__title">Recent highlights</h2>
          </div>

          <div class="home-highlights__grid" id="highlights-grid">
            <button type="button" class="home-highlights__card">
              <span class="home-highlights__card-tag">Voice</span>
              <span class="home-highlights__card-title">Spotlight vidéo</span>
              <span class="home-highlights__card-desc">
                Agrandissez la caméra ou le partage d'écran d'un participant en un clic.
              </span>
            </button>
            <button type="button" class="home-highlights__card">
              <span class="home-highlights__card-tag">Chat</span>
              <span class="home-highlights__card-title">Handoff IA</span>
              <span class="home-highlights__card-desc">
                Transmettez un extrait de conversation à un collègue ou un groupe.
              </span>
            </button>
            <button type="button" class="home-highlights__card">
              <span class="home-highlights__card-tag">Calls</span>
              <span class="home-highlights__card-title">AI Notes</span>
              <span class="home-highlights__card-desc">
                Transcription live pendant vos appels vocaux, directement dans Lyte.
              </span>
            </button>
            <button type="button" class="home-highlights__card">
              <span class="home-highlights__card-tag">Connectors</span>
              <span class="home-highlights__card-title">Spotify dans le chat</span>
              <span class="home-highlights__card-desc">
                Lancez une piste ou ajoutez-la à la file depuis le composer.
              </span>
            </button>
            <button type="button" class="home-highlights__card home-highlights__card--extra">
              <span class="home-highlights__card-tag">Presence</span>
              <span class="home-highlights__card-title">Mute &amp; main levée</span>
              <span class="home-highlights__card-desc">
                Voyez en direct qui est mute ou a levé la main dans l'appel.
              </span>
            </button>
            <button type="button" class="home-highlights__card home-highlights__card--extra">
              <span class="home-highlights__card-tag">Follow-up</span>
              <span class="home-highlights__card-title">Récap post-appel</span>
              <span class="home-highlights__card-desc">
                Synthèse structurée, calendrier et e-mails après votre réunion.
              </span>
            </button>
          </div>

          <div class="home-highlights__actions">
            <button
              type="button"
              class="home-highlights__more"
              id="highlights-more"
              aria-expanded="false"
              aria-controls="highlights-grid"
            >
              <span class="home-highlights__more-label">View more product upgrades</span>
              <svg
                class="home-highlights__more-icon"
                aria-hidden="true"
                viewBox="0 0 24 24"
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="home-try section-headline" aria-labelledby="try-heading">
        <div class="home-try__container">
          <div class="home-try__content">
            <h2 id="try-heading" class="home-try__title">Try Lyte Now.</h2>
            <div class="home-try__actions">
              <div class="home-try__desktop">
                <a
                  class="btn btn--primary home-try__download"
                  id="home-download"
                  href="/downloads/Lyte-mac.dmg"
                  download
                >
                  <span id="home-download-label">Download for macOS</span>
                  <span class="btn-icon" aria-hidden="true">⤓</span>
                </a>
              </div>
              <div class="home-try__mobile">
                <a class="btn btn--primary" href="auth.html">
                  <span>Commencer</span>
                  <span class="btn-icon" aria-hidden="true">→</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="nav.js"></script>
    <script src="footer.js"></script>
    <script src="home.js"></script>
  </body>
</html>
