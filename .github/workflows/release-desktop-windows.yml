name: Release Windows Desktop

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Hall Setup (.exe)
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      FORMA_PROD_BUILD: "1"
      EVS_NO_ASK: "1"
      AZURE_CODESIGN_ENDPOINT: ${{ vars.AZURE_CODESIGN_ENDPOINT }}
      AZURE_CODESIGN_CERT_PROFILE: ${{ vars.AZURE_CODESIGN_CERT_PROFILE }}
      AZURE_CODESIGN_ACCOUNT: ${{ vars.AZURE_CODESIGN_ACCOUNT }}
      AZURE_CODESIGN_PUBLISHER: ${{ vars.AZURE_CODESIGN_PUBLISHER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure Trusted Signing config
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          check() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "::error::Variable/secret $name manquant."
              missing=1
            fi
          }
          check "AZURE_CODESIGN_ENDPOINT (repo variable)" "${{ vars.AZURE_CODESIGN_ENDPOINT }}"
          check "AZURE_CODESIGN_CERT_PROFILE (repo variable)" "${{ vars.AZURE_CODESIGN_CERT_PROFILE }}"
          check "AZURE_CODESIGN_ACCOUNT (repo variable)" "${{ vars.AZURE_CODESIGN_ACCOUNT }}"
          check "AZURE_CODESIGN_PUBLISHER (repo variable)" "${{ vars.AZURE_CODESIGN_PUBLISHER }}"
          check "AZURE_TENANT_ID (secret)" "${{ secrets.AZURE_TENANT_ID }}"
          check "AZURE_CLIENT_ID (secret)" "${{ secrets.AZURE_CLIENT_ID }}"
          check "AZURE_CLIENT_SECRET (secret)" "${{ secrets.AZURE_CLIENT_SECRET }}"
          check "EVS_ACCOUNT_NAME (secret)" "${{ secrets.EVS_ACCOUNT_NAME }}"
          check "EVS_PASSWD (secret)" "${{ secrets.EVS_PASSWD }}"
          if [[ "$missing" -ne 0 ]]; then
            echo ""
            echo "Configurez Azure Trusted Signing puis relancez le workflow."
            echo "Guide : docs/DESKTOP.md section « Azure Trusted Signing »"
            echo "Script : ./scripts/setup-azure-trusted-signing.sh"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install castlabs-evs
        run: python -m pip install --upgrade pip castlabs-evs

      - name: Refresh EVS authorization
        env:
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
        run: python -m castlabs_evs.account refresh

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create backend virtualenv
        working-directory: backend
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install -r requirements.txt
          .venv\Scripts\pip install -r requirements-cad.txt

      - name: Generate app icon
        run: |
          python -m pip install pillow
          python scripts/generate-app-icon.py

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Prepare desktop resources
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCEgeoE7cOh8OA1l2rQSF0VTJ0pY1GYgx4
          VITE_FIREBASE_AUTH_DOMAIN: forma-cad-dev.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: forma-cad-dev
          VITE_FIREBASE_STORAGE_BUCKET: forma-cad-dev.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "341690938979"
          VITE_FIREBASE_APP_ID: 1:341690938979:web:e44bbe2e180e0b1cdaea56
          VITE_FIREBASE_FUNCTIONS_REGION: northamerica-northeast1
        run: node scripts/prepare-desktop-resources.cjs

      - name: Build signed Windows installer
        working-directory: desktop
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
        run: npx electron-builder --config electron-builder.config.cjs --win nsis

      - name: List build output
        run: dir desktop\release

      - name: Prepare stable download filename
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path landing/downloads, landing/public/downloads | Out-Null
          $exe = Get-ChildItem desktop/release/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in desktop/release" }
          Copy-Item $exe.FullName landing/public/downloads/Hall-windows.exe -Force
          Copy-Item $exe.FullName landing/downloads/Hall-windows.exe -Force
          Write-Host "Stable artifact: landing/public/downloads/Hall-windows.exe"

      - name: Upload installer to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.exe
            landing/public/downloads/Hall-windows.exe
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hall-windows-installer
          path: |
            desktop/release/*.exe
            landing/public/downloads/Hall-windows.exe
          if-no-files-found: error
          retention-days: 30
